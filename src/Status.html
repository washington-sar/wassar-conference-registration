<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 600px; margin: 20px auto; background: #fff; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: #1a5490; color: #fff; padding: 24px; text-align: center; }
    .content { padding: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: bold; margin-bottom: 4px; }
    input[type="email"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .btn { padding: 12px 28px; border: none; border-radius: 4px; font-size: 15px;
      cursor: pointer; font-weight: bold; background: #1a5490; color: #fff; }
    .btn:disabled { opacity: 0.5; }

    .reg-card { margin-top: 20px; }
    .reg-id { background: #f0f8ff; padding: 15px; border-left: 4px solid #1a5490; margin-bottom: 16px; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px;
      font-size: 13px; font-weight: bold; }
    .status-unpaid { background: #ffeaa7; color: #856404; }
    .status-paid { background: #d4edda; color: #155724; }

    .detail-section { background: #f9f9f9; padding: 16px; border-radius: 4px; margin-bottom: 12px; }
    .detail-section h4 { color: #1a5490; margin-bottom: 8px; }
    .detail-row { display: flex; padding: 4px 0; font-size: 14px; }
    .detail-label { flex: 0 0 160px; font-weight: bold; }

    .totals { margin: 16px 0; }
    .totals td { padding: 10px 20px; }
    .zelle { background: #b1bde3; border: 1px solid #0b2c82; }
    .cc { background: #f0abbc; border: 1px solid #9d1736; }

    .pay-btn { display: inline-block; background: #1a5490; color: #fff; padding: 12px 30px;
      text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 12px; }

    .not-found { color: #c0392b; margin-top: 16px; }
    .edit-link { margin-top: 16px; }
    .edit-link a { color: #1a5490; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Registration Status</h1>
    </div>
    <div class="content">
      <div id="lookupForm">
        <div class="form-group">
          <label>Enter your email address</label>
          <input type="email" id="lookupEmail" placeholder="your@email.com"
            onkeypress="if(event.key==='Enter')lookup()">
        </div>
        <button class="btn" id="lookupBtn" onclick="lookup()">Look Up Registration</button>
        <div id="notFound" class="not-found" style="display:none">
          No registration found for that email address.
        </div>
      </div>

      <div id="regDetails" style="display:none"></div>
    </div>
  </div>

<script>
  var _INJECTED_PARAMS_ = "PLACEHOLDER";
  function lookup() {
    var email = document.getElementById('lookupEmail').value.trim();
    if (!email) { alert('Please enter your email.'); return; }

    document.getElementById('lookupBtn').disabled = true;
    document.getElementById('notFound').style.display = 'none';

    google.script.run
      .withSuccessHandler(showResult)
      .withFailureHandler(function(e) {
        alert('Error: ' + e.message);
        document.getElementById('lookupBtn').disabled = false;
      })
      .lookupRegistration(email);
  }

  function showResult(raw) {
    document.getElementById('lookupBtn').disabled = false;
    var reg = raw ? JSON.parse(raw) : null;

    if (!reg) {
      document.getElementById('notFound').style.display = 'block';
      document.getElementById('regDetails').style.display = 'none';
      return;
    }

    var isPaid = reg.PaymentStatus && reg.PaymentStatus.toString().toLowerCase().indexOf('paid') >= 0;
    var statusClass = isPaid ? 'status-paid' : 'status-unpaid';
    var statusText = reg.PaymentStatus || 'Unpaid';

    var html = '<div class="reg-card">';
    html += '<div class="reg-id"><strong>Registration ID:</strong> ' + esc(reg.RegistrationID) +
      ' &nbsp; <span class="status-badge ' + statusClass + '">' + esc(statusText) + '</span></div>';

    // Contact details
    html += '<div class="detail-section"><h4>Contact Information</h4>';
    html += detailRow('Name', reg.Name);
    html += detailRow('Email', reg.Email);
    if (reg.Phone) html += detailRow('Phone', reg.Phone);
    if (reg.Chapter) html += detailRow('Chapter', reg.Chapter);
    if (reg.OfficeTitle) html += detailRow('Office/Title', reg.OfficeTitle);
    if (reg.Affiliations) html += detailRow('Affiliations', reg.Affiliations);
    if (reg.Lodging) html += detailRow('Lodging', reg.Lodging);
    html += '</div>';

    // Guests
    if (reg.guests && reg.guests.length > 0) {
      html += '<div class="detail-section"><h4>Guests</h4>';
      for (var i = 0; i < reg.guests.length; i++) {
        html += detailRow('Guest ' + (i + 1), reg.guests[i].name +
          (reg.guests[i].email ? ' (' + reg.guests[i].email + ')' : ''));
        if (reg.guests[i].mealsRaw) html += detailRow('  Meals', reg.guests[i].mealsRaw);
      }
      html += '</div>';
    }

    // Totals
    var total = reg.TotalDue || 0;
    html += '<table class="totals" style="border-collapse:collapse">' +
      '<tr><td class="zelle"><strong>Check/Zelle Total:</strong></td>' +
      '<td class="zelle"><strong>$' + Number(total).toFixed(2) + '</strong></td></tr>' +
      '<tr><td class="cc"><strong>Credit Card Total:</strong></td>' +
      '<td class="cc"><strong>$' + Number(reg.totalWithFees).toFixed(2) + '</strong><br>' +
      '<span style="font-size:12px;color:#666">includes $' + Number(reg.fees).toFixed(2) + ' fee</span>' +
      '</td></tr></table>';

    // Payment button if unpaid
    if (!isPaid && reg.stripeUrl) {
      html += '<a href="' + reg.stripeUrl + '" target="_blank" class="pay-btn" style="color:#fff">' +
        'Pay with Credit Card</a>';
    }

    // Edit link if registration is still open
    if (reg.isOpen && !isPaid) {
      html += '<div class="edit-link"><a href="#" onclick="goToEdit()">Edit Registration</a></div>';
    }

    html += '</div>';
    document.getElementById('regDetails').innerHTML = html;
    document.getElementById('regDetails').style.display = 'block';
  }

  function detailRow(label, value) {
    return '<div class="detail-row"><span class="detail-label">' + esc(label) +
      ':</span><span>' + esc(value || '') + '</span></div>';
  }

  function esc(s) {
    if (!s) return '';
    var div = document.createElement('div');
    div.textContent = String(s);
    return div.innerHTML;
  }

  function goToEdit() {
    var email = document.getElementById('lookupEmail').value.trim();
    google.script.run
      .withSuccessHandler(function(url) {
        window.open(url + '?email=' + encodeURIComponent(email), '_top');
      })
      .withFailureHandler(function() {
        window.location.href = window.location.href.replace('page=status', 'page=index');
      })
      .getScriptUrl();
  }
  // Auto-lookup if email passed in URL
  var urlEmail = window._urlEmail || '';
  if (urlEmail) {
    document.getElementById('lookupEmail').value = urlEmail;
    lookup();
  }
</script>
</body>
</html>
